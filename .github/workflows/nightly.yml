name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  BASALT_DATABASE_DSN: postgres://basalt:basalt@localhost:5432/basalt?sslmode=disable
  BASALT_REDIS_ADDR: localhost:6379
  BASALT_ENCRYPTION_MODE: local
  BASALT_ENCRYPTION_LOCAL_KEY_PATH: ./secrets/local.key.example
  BASALT_TELEMETRY_ENABLED: "false"

jobs:
  nightly:
    name: nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Docker build (no cache)
        run: |
          for svc in gateway api worker; do
            docker build --no-cache -f deploy/Dockerfile --build-arg SERVICE=$svc -t basaltrouter-$svc:nightly .
          done

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.NIGHTLY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "NIGHTLY_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text":"BasaltRouter nightly build failed on main"}'
